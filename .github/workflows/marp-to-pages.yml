name: marp-to-pages
concurrency: marp-to-pages

on:
  push:
    branches: [ main ]
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install packages
        run: npm install

      - name: Ensure build dir exists
        run: mkdir -p build

      - name: Copy images directory (if exists)
        run: |
          if [[ -d img ]]; then
            cp -R img build/img;
          fi

      - name: Marp Build (README HTML)
        run: |
          npx marp README.md \
            --config marp.config.mjs \
            --allow-local-files \
            -o build/index.html

      - name: Marp Build (README PDF)
        run: |
          npx marp README.md \
            --config marp.config.mjs \
            --allow-local-files \
            -o build/README.pdf

      - name: Marp Build (README PPTX)
        run: |
          npx marp README.md \
            --config marp.config.mjs \
            -o build/README.pptx

      - name: Check if docs folder exists
        id: docs-folder-exists
        run: |
          bash -c "[[ -d docs ]] ; echo \"has_docs=\$?\" >> \"$GITHUB_OUTPUT\""

      - name: Marp Build (docs folder)
        if: steps.docs-folder-exists.outputs.has_docs == '0'
        run: |
          npx marp -I docs/ \
            --config marp.config.mjs \
            -o build/docs/

      - name: Deploy preview
        if: ${{ github.event_name == 'pull_request' }}
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./build/
          preview-branch: gh-pages
          umbrella-dir: pr-preview

      - name: Deploy production
        if: ${{ github.event_name == 'push' }}
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: ./build/
          clean-exclude: pr-preview/
